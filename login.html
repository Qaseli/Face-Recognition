<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Portal - Facial Recognition System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'blue');</script>
</head>

<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <h2>System Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div id="error-msg" class="error-msg"></div>
                <button type="submit" class="btn-primary">Login</button>
            </form>

            <div
                style="margin: 20px 0; border-top: 1px solid var(--border-color); position: relative; text-align: center;">
                <span
                    style="background: var(--card-bg); padding: 0 10px; position: relative; top: -10px; color: var(--text-secondary); font-size: 0.8rem;">OR</span>
            </div>

            <button type="button" id="googleBtn" class="btn-primary"
                style="background: white; color: #333; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18">
                Sign in with Google
            </button>
        </div>
    </div>


    <script>
        // Force logout to clear stale sessions
        fetch('/api/logout', { method: 'POST' }).finally(() => console.log('Session cleared'));

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const errorMsg = document.getElementById('error-msg');

            // UI Feedback
            btn.innerHTML = 'Logging in...';
            btn.style.opacity = '0.7';
            errorMsg.textContent = '';
            errorMsg.style.display = 'none';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    if (data.status === 'first_login_required') {
                        window.location.href = `change_password.html?user=${encodeURIComponent(data.user)}`;
                    } else if (data.role === 'admin') {
                        window.location.href = 'index.html';
                    } else {
                        window.location.href = 'staff_dashboard.html';
                    }
                } else {
                    throw new Error(data.message || 'Login failed');
                }
            } catch (err) {
                console.error(err);
                errorMsg.textContent = err.message || 'Connection error';
                errorMsg.style.display = 'block';
                btn.innerHTML = 'Login';
                btn.style.opacity = '1';
            }
        });
    </script>


    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC1AjYHEF4z7cixTuJN2cPOK1QQWGwJzY0",
            authDomain: "facial-recognition-43660.firebaseapp.com",
            projectId: "facial-recognition-43660",
            storageBucket: "facial-recognition-43660.firebasestorage.app",
            messagingSenderId: "59463716572",
            appId: "1:59463716572:web:8b3d6c14d94a89ae9d2e19"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('googleBtn').addEventListener('click', async () => {
            const btn = document.getElementById('googleBtn');
            const errorMsg = document.getElementById('error-msg');

            errorMsg.textContent = '';
            errorMsg.style.display = 'none';
            btn.style.opacity = '0.7';

            try {
                // 1. Google Popup Login
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const token = await user.getIdToken();

                // 2. Send Token to Backend
                const res = await fetch('/api/login/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_token: token })
                });

                const data = await res.json();

                if (res.ok) {
                    // 3. Handle Success Redirect
                    if (data.status === 'first_login_required') {
                        window.location.href = `change_password.html?user=${encodeURIComponent(data.user)}`;
                    } else if (data.role === 'admin') {
                        window.location.href = 'index.html';
                    } else {
                        window.location.href = 'staff_dashboard.html';
                    }
                } else {
                    throw new Error(data.error || 'Google Login Failed');
                }

            } catch (error) {
                console.error("Google Auth Error:", error);
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } finally {
                btn.style.opacity = '1';
            }
        });
    </script>
</body>

</html>
