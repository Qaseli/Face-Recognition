<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Login - Change Password</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'blue');</script>
</head>

<body style="display:flex; justify-content:center; align-items:center; height:100vh; background: var(--bg-color);">

    <div class="card" style="width: 100%; max-width: 400px; padding: 30px;">
        <h2 style="text-align: center; margin-bottom: 20px;">Setup Your Account</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 20px;">
            This is your first login. Please verify your temporary password and set a new one.
        </p>

        <form id="changePassForm">
            <div class="form-group">
                <label>Staff ID (Username)</label>
                <input type="text" id="username" readonly style="opacity: 0.7; cursor: not-allowed;">
            </div>

            <div class="form-group">
                <label>Temporary Password</label>
                <input type="password" id="tempPass" required>
            </div>

            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPass" required minlength="6">
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPass" required minlength="6">
            </div>

            <button type="submit" class="btn-primary" style="width: 100%;">Set Password & Activate</button>
        </form>
    </div>

    <script>
        // Get username from URL params
        const urlParams = new URLSearchParams(window.location.search);
        const user = urlParams.get('user');

        if (!user) {
            alert('Invalid access');
            window.location.href = 'login.html';
        }

        document.getElementById('username').value = user;

        document.getElementById('changePassForm').onsubmit = async (e) => {
            e.preventDefault();
            const tempPass = document.getElementById('tempPass').value;
            const newPass = document.getElementById('newPass').value;
            const confirmPass = document.getElementById('confirmPass').value;

            if (newPass !== confirmPass) {
                Swal.fire('Error', 'New passwords do not match.', 'error');
                return;
            }

            try {
                const res = await fetch('/api/change_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: user,
                        temp_password: tempPass,
                        new_password: newPass
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    await Swal.fire({
                        title: 'Success!',
                        text: 'Password updated. Your account is now active.',
                        icon: 'success',
                        confirmButtonText: 'Login Now'
                    });
                    window.location.href = 'login.html';
                } else {
                    Swal.fire('Error', data.error || 'Failed to update.', 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'Connection error.', 'error');
            }
        };
    </script>
</body>

</html>
